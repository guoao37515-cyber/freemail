name = "freemail"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars=true

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db" #你的d1数据库名称
database_id = "5fa6cd1a-75a4-4e14-a013-cbc648ec5bd3" # 你的database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"example@qq.com"}]"
ADMIN_NAME="2693867207"
ADMIN_PASSWORD="guo123654"
GUEST_PASSWORD="123654"
JWT_TOKEN="wdsj2693867207"
JWT_TOKENGUEST_PASSWORD="guo123654"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="wuyouduanju.top"
RESEND_API_KEY="re_Exqj6acW_CUV2mNwXXb4eMpyqFZWpceYP"



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# R2 存储桶绑定（用于保存完整 EML 内容）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mail-eml"

